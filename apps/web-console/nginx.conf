# Console SPA server + same-origin API edge (fix-console-edge-routing, #505).
#
# The SPA issues same-origin /v1/* API calls (apps/web-console/src/lib/http.ts uses relative
# URLs). Without an edge, nginx's SPA catch-all rewrote /v1/* to index.html, so the browser got
# HTML for every API call. We add a /v1/ location that proxies to the gateway (APISIX), which
# validates the JWT and forwards to the control-plane — so the console talks to the backend in the
# deployed topology without CORS or hardcoded API hostnames.
#
# Rendered by the nginx image's envsubst from /etc/nginx/templates/default.conf.template:
# ${GATEWAY_UPSTREAM} is the gateway service (default falcone-apisix:9080; the chart overrides it
# when the release name differs). nginx's own $variables are left untouched (envsubst only
# substitutes variables present in the environment).
server {
  listen 3000;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_vary on;
  gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

  # Same-origin API edge: proxy /v1/* to the gateway (APISIX → control-plane). MUST precede the
  # SPA catch-all; the longer /v1/ prefix wins over / for these requests.
  location /v1/ {
    proxy_pass http://${GATEWAY_UPSTREAM};
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
  }

  location = /index.html {
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-src 'self'; worker-src 'self' blob:; form-action 'self'" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
    add_header Cache-Control 'no-store';
    try_files $uri =404;
  }

  location /assets/ {
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-src 'self'; worker-src 'self' blob:; form-action 'self'" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
    add_header Cache-Control 'public, max-age=31536000, immutable';
    try_files $uri =404;
  }

  location / {
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-src 'self'; worker-src 'self' blob:; form-action 'self'" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
    try_files $uri $uri/ /index.html;
  }
}
