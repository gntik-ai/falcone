<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B2D5B"/>
      <stop offset="100%" stop-color="#0F1B3D"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- === FALCON — profile facing right, perched === -->

  <!-- Wing (behind body) -->
  <path d="
    M 205 195
    C 180 175, 140 155, 110 160
    C 85 164, 68 178, 62 195
    C 56 215, 65 235, 80 248
    C 95 261, 115 258, 135 250
    C 155 242, 175 228, 195 215
    Z
  " fill="#C8A44E" opacity="0.55"/>

  <!-- Body + head -->
  <path d="
    M 255 95
    C 240 92, 222 100, 215 115
    C 208 130, 210 148, 218 160
    L 222 165
    C 228 170, 240 178, 248 175
    L 268 164
    L 275 168
    L 268 175
    C 262 180, 268 182, 275 180
    L 290 170
    C 295 167, 298 162, 295 157
    L 280 148
    C 275 142, 272 135, 272 128
    C 272 115, 268 100, 255 95
    Z
  " fill="#C8A44E"/>

  <!-- Eye -->
  <circle cx="248" cy="128" r="7" fill="#0F1B3D"/>
  <circle cx="250" cy="126" r="2.2" fill="#C8A44E" opacity="0.5"/>

  <!-- Beak notch detail (tomial tooth — falcon signature) -->
  <path d="M 280 148 L 285 152 L 290 150" stroke="#0F1B3D" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Chest + belly -->
  <path d="
    M 222 165
    C 215 180, 210 200, 212 220
    C 214 240, 220 258, 230 270
    C 235 277, 242 280, 250 282
    C 258 280, 265 275, 270 268
    C 280 252, 282 235, 280 218
    C 278 200, 272 185, 268 175
    C 258 185, 245 188, 235 182
    C 228 178, 224 172, 222 165
    Z
  " fill="#C8A44E"/>

  <!-- Chest feather marks -->
  <path d="M 232 210 C 240 208, 258 208, 265 212" stroke="#0F1B3D" stroke-width="1" opacity="0.2" fill="none"/>
  <path d="M 230 225 C 238 222, 260 222, 268 226" stroke="#0F1B3D" stroke-width="1" opacity="0.15" fill="none"/>
  <path d="M 232 240 C 240 237, 258 237, 266 241" stroke="#0F1B3D" stroke-width="1" opacity="0.1" fill="none"/>

  <!-- Tail feathers -->
  <path d="
    M 212 220
    C 195 230, 170 245, 145 265
    C 135 272, 130 270, 128 264
    C 126 255, 135 245, 150 238
    C 170 225, 190 215, 205 210
    Z
  " fill="#C8A44E" opacity="0.7"/>

  <!-- Talons gripping the scale beam -->
  <path d="
    M 238 280 L 234 295 L 230 298 L 236 296 L 240 290
    M 250 282 L 252 295 L 256 298 L 254 294 L 250 288
    M 260 278 L 264 293 L 268 296 L 264 293 L 260 285
  " stroke="#C8A44E" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- === SCALES OF JUSTICE === -->

  <!-- Fulcrum (small triangle) -->
  <polygon points="250,296 244,306 256,306" fill="#C8A44E"/>

  <!-- Beam -->
  <line x1="155" y1="306" x2="345" y2="306" stroke="#C8A44E" stroke-width="3" stroke-linecap="round"/>

  <!-- Left chain -->
  <line x1="175" y1="306" x2="175" y2="348" stroke="#C8A44E" stroke-width="2"/>

  <!-- Right chain -->
  <line x1="325" y1="306" x2="325" y2="348" stroke="#C8A44E" stroke-width="2"/>

  <!-- Left pan -->
  <path d="
    M 145 348
    C 145 348, 155 365, 175 365
    C 195 365, 205 348, 205 348
    Z
  " fill="#C8A44E" opacity="0.8"/>

  <!-- Right pan -->
  <path d="
    M 295 348
    C 295 348, 305 365, 325 365
    C 345 365, 355 348, 355 348
    Z
  " fill="#C8A44E" opacity="0.8"/>

  <!-- Small dots at chain-beam joints -->
  <circle cx="175" cy="306" r="4" fill="#C8A44E"/>
  <circle cx="325" cy="306" r="4" fill="#C8A44E"/>

  <!-- === TEXT === -->
  <text x="256" y="430" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-weight="700" font-size="46" letter-spacing="10"
        fill="#C8A44E">IN FALCONE</text>

  <!-- Subtle line under text -->
  <line x1="140" y1="445" x2="372" y2="445" stroke="#C8A44E" stroke-width="1" opacity="0.3"/>
</svg>
