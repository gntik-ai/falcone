  <path d="M 75 86 C 75 86, 78 92, 82 92 C 86 92, 89 86, 89 86 Z" fill="#C8A44E" opacity="0.8"/>
  <circle cx="44" cy="75" r="1.5" fill="#C8A44E"/>
  <circle cx="82" cy="75" r="1.5" fill="#C8A44E"/>
