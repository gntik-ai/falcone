name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - feature/**

permissions:
  contents: read

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10.0.0'

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint and repository validation
        run: pnpm lint

      - name: Unit tests
        run: pnpm test:unit

      - name: Adapter integration scaffolding
        run: pnpm test:adapters

      - name: Contract tests
        run: pnpm test:contracts

      - name: Console E2E scaffolding
        run: pnpm test:e2e:console

      - name: Deployment smoke scaffolding
        run: pnpm test:e2e:deployment

      - name: Resilience scaffolding
        run: pnpm test:resilience

      - name: Plan Enforcement Coherence Tests
        run: node --test --test-reporter=tap tests/integration/plan-enforcement/suites/*.test.mjs
        env:
          GATEWAY_BASE_URL: ${{ secrets.GATEWAY_BASE_URL }}
          CONTROL_PLANE_URL: ${{ secrets.CONTROL_PLANE_URL }}
          CONSOLE_API_URL: ${{ secrets.CONSOLE_API_URL }}
          KEYCLOAK_URL: ${{ secrets.KEYCLOAK_URL }}
          KEYCLOAK_REALM: ${{ secrets.KEYCLOAK_REALM }}
          SUPERADMIN_CLIENT_ID: ${{ secrets.SUPERADMIN_CLIENT_ID }}
          SUPERADMIN_CLIENT_SECRET: ${{ secrets.SUPERADMIN_CLIENT_SECRET }}
          KAFKA_BROKERS: ${{ secrets.KAFKA_BROKERS }}
          KAFKA_AUDIT_TOPIC: ${{ secrets.KAFKA_AUDIT_TOPIC }}
          TEST_RESULT_OUTPUT_PATH: test-results/plan-enforcement-report.json

      - name: Upload plan enforcement test artifact
        uses: actions/upload-artifact@v4
        with:
          name: plan-enforcement-tests-result
          path: test-results/plan-enforcement-report.json
          if-no-files-found: ignore

      - name: Plan Upgrade/Downgrade E2E Tests
        run: node --test --test-reporter=tap tests/e2e/101-plan-upgrade-downgrade-tests/index.test.mjs
        env:
          TEST_API_BASE_URL: ${{ secrets.TEST_API_BASE_URL }}
          TEST_SUPERADMIN_TOKEN: ${{ secrets.TEST_SUPERADMIN_TOKEN }}
          TEST_PG_DSN: ${{ secrets.TEST_PG_DSN }}
          KAFKA_ENABLED: 'true'
          KAFKA_BROKERS: ${{ secrets.KAFKA_BROKERS }}
          TEST_RESULT_OUTPUT_PATH: test-results/101-plan-upgrade-downgrade-tests-result.json

      - name: Upload plan upgrade/downgrade test artifact
        uses: actions/upload-artifact@v4
        with:
          name: plan-upgrade-downgrade-tests-result
          path: test-results/101-plan-upgrade-downgrade-tests-result.json
          if-no-files-found: ignore

      - name: Upload control-plane contract artifact
        uses: actions/upload-artifact@v4
        with:
          name: control-plane-openapi-contract
          path: apps/control-plane/openapi/control-plane.openapi.json
          if-no-files-found: error

      - name: Upload deployment topology artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment-topology-contract
          path: services/internal-contracts/src/deployment-topology.json
          if-no-files-found: error

      - name: Upload domain model artifact
        uses: actions/upload-artifact@v4
        with:
          name: domain-model-contract
          path: services/internal-contracts/src/domain-model.json
          if-no-files-found: error

  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dependency vulnerability audit
        run: pnpm security:deps

      - name: Image supply-chain policy validation
        run: pnpm security:images
