name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - feature/**

permissions:
  contents: read

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10.0.0'

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout deployment charts
        uses: actions/checkout@v4
        with:
          repository: gntik-ai/falcone-charts
          path: falcone-charts

      - name: Expose sibling charts checkout
        run: ln -sfn "$GITHUB_WORKSPACE/falcone-charts" "$GITHUB_WORKSPACE/../falcone-charts"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint and repository validation
        run: pnpm lint

      - name: Unit tests
        run: pnpm test:unit

      - name: Adapter integration scaffolding
        run: pnpm test:adapters

      - name: Contract tests
        run: pnpm test:contracts

      - name: Console E2E scaffolding
        run: pnpm test:e2e:console

      - name: Deployment smoke scaffolding
        run: pnpm test:e2e:deployment

      - name: Resilience scaffolding
        run: pnpm test:resilience

      # SeaweedFS migration validation (change add-seaweedfs-migration-validation).
      # Gated OFF by default (repo variable SEAWEEDFS_VALIDATION != '1') so normal CI
      # is unaffected; enable only when a SeaweedFS-backed env + Postgres are reachable
      # (operator supplies S3_ENDPOINT / creds / DATABASE_URL as repo vars/secrets).
      # Runs the parity checker + per-tenant storage smoke via the blackbox entrypoint.
      - name: SeaweedFS migration validation (gated)
        if: ${{ vars.SEAWEEDFS_VALIDATION == '1' }}
        env:
          SEAWEEDFS_VALIDATION: '1'
          S3_ENDPOINT: ${{ vars.SEAWEEDFS_S3_ENDPOINT }}
          S3_ACCESS_KEY: ${{ secrets.SEAWEEDFS_S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.SEAWEEDFS_S3_SECRET_KEY }}
          DATABASE_URL: ${{ secrets.SEAWEEDFS_VALIDATION_DATABASE_URL }}
          MIGRATION_MANIFEST: ${{ vars.SEAWEEDFS_MIGRATION_MANIFEST }}
        run: bash tests/blackbox/run.sh

      # FerretDB migration validation (change add-ferretdb-migration-validation).
      # Gated OFF by default (repo variable FERRETDB_VALIDATION != '1') so normal CI is
      # unaffected; enable only when a FerretDB v2 + DocumentDB endpoint is reachable
      # (operator supplies FERRETDB_URI + the migration manifest as repo vars/secrets).
      # Runs the document-parity checker + per-tenant data-API smoke (incl. ADR-14 risk-area
      # probes) via the blackbox entrypoint; FERRETDB_VALIDATION_NO_COMPOSE skips local compose
      # bring-up when the endpoint is an external service rather than tests/env docker-compose.
      - name: FerretDB migration validation (gated)
        if: ${{ vars.FERRETDB_VALIDATION == '1' }}
        env:
          FERRETDB_VALIDATION: '1'
          FERRETDB_VALIDATION_NO_COMPOSE: '1'
          FERRETDB_URI: ${{ secrets.FERRETDB_URI }}
          MIGRATION_MANIFEST: ${{ vars.FERRETDB_MIGRATION_MANIFEST }}
        run: bash tests/blackbox/run.sh

      - name: Plan Enforcement Coherence Tests
        run: node --test --test-reporter=tap tests/integration/plan-enforcement/suites/*.test.mjs
        env:
          GATEWAY_BASE_URL: ${{ secrets.GATEWAY_BASE_URL }}
          CONTROL_PLANE_URL: ${{ secrets.CONTROL_PLANE_URL }}
          CONSOLE_API_URL: ${{ secrets.CONSOLE_API_URL }}
          KEYCLOAK_URL: ${{ secrets.KEYCLOAK_URL }}
          KEYCLOAK_REALM: ${{ secrets.KEYCLOAK_REALM }}
          SUPERADMIN_CLIENT_ID: ${{ secrets.SUPERADMIN_CLIENT_ID }}
          SUPERADMIN_CLIENT_SECRET: ${{ secrets.SUPERADMIN_CLIENT_SECRET }}
          KAFKA_BROKERS: ${{ secrets.KAFKA_BROKERS }}
          KAFKA_AUDIT_TOPIC: ${{ secrets.KAFKA_AUDIT_TOPIC }}
          TEST_RESULT_OUTPUT_PATH: test-results/plan-enforcement-report.json

      - name: Upload plan enforcement test artifact
        uses: actions/upload-artifact@v4
        with:
          name: plan-enforcement-tests-result
          path: test-results/plan-enforcement-report.json
          if-no-files-found: ignore

      - name: Plan Upgrade/Downgrade E2E Tests
        run: node --test --test-reporter=tap tests/e2e/101-plan-upgrade-downgrade-tests/index.test.mjs
        env:
          TEST_API_BASE_URL: ${{ secrets.TEST_API_BASE_URL }}
          TEST_SUPERADMIN_TOKEN: ${{ secrets.TEST_SUPERADMIN_TOKEN }}
          TEST_PG_DSN: ${{ secrets.TEST_PG_DSN }}
          KAFKA_ENABLED: 'true'
          KAFKA_BROKERS: ${{ secrets.KAFKA_BROKERS }}
          TEST_RESULT_OUTPUT_PATH: test-results/101-plan-upgrade-downgrade-tests-result.json

      - name: Upload plan upgrade/downgrade test artifact
        uses: actions/upload-artifact@v4
        with:
          name: plan-upgrade-downgrade-tests-result
          path: test-results/101-plan-upgrade-downgrade-tests-result.json
          if-no-files-found: ignore

      - name: Upload control-plane contract artifact
        uses: actions/upload-artifact@v4
        with:
          name: control-plane-openapi-contract
          path: apps/control-plane/openapi/control-plane.openapi.json
          if-no-files-found: error

      - name: Upload deployment topology artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment-topology-contract
          path: services/internal-contracts/src/deployment-topology.json
          if-no-files-found: error

      - name: Upload domain model artifact
        uses: actions/upload-artifact@v4
        with:
          name: domain-model-contract
          path: services/internal-contracts/src/domain-model.json
          if-no-files-found: error

  web-console:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Web console unit tests (vitest)
        run: pnpm --filter @in-falcone/web-console test

  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout deployment charts
        uses: actions/checkout@v4
        with:
          repository: gntik-ai/falcone-charts
          path: falcone-charts

      - name: Expose sibling charts checkout
        run: ln -sfn "$GITHUB_WORKSPACE/falcone-charts" "$GITHUB_WORKSPACE/../falcone-charts"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dependency vulnerability audit
        run: pnpm security:deps

      - name: Image supply-chain policy validation
        run: pnpm security:images

      - name: Third-party license report (SBOM)
        run: |
          mkdir -p sbom
          pnpm --silent sbom:licenses | tee sbom/third-party-licenses.txt
          pnpm --silent sbom:licenses:json > sbom/third-party-licenses.json

      - name: Upload third-party license report
        uses: actions/upload-artifact@v4
        with:
          name: third-party-license-report
          path: sbom/
          if-no-files-found: error

  real-stack:
    # Boots the tests/env Postgres (pgvector image) and runs the control-plane
    # executor real-stack slice — incl. the vector-search cross-tenant KNN probe,
    # RLS, data/DDL/realtime executors — against a REAL database. These prove the
    # tenant-isolation guarantees that in-memory unit tests cannot.
    runs-on: ubuntu-latest
    # The tests/env compose stack uses a FIXED compose project name (falcone-testenv) and a
    # FIXED host port (55432). On a shared Docker host (self-hosted runners), two concurrent
    # real-stack runs collide ("address already in use" / container-name conflict, issue #413).
    # Serialize repo-wide so only one run touches the shared host at a time. GLOBAL group (not
    # per-branch): the Docker host is the shared resource. cancel-in-progress:false => queue, so
    # the running integration finishes and tears down cleanly rather than being killed mid-run.
    concurrency:
      group: real-stack-shared-host
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Defensive: clear any leftover stack from a hard-killed prior run (the trap-based
      # teardown can be skipped if a job is force-cancelled). Serialization (above) prevents
      # concurrent collisions; this handles residue. Safe no-op when nothing is running.
      - name: Pre-clean any leftover tests/env stack
        run: docker compose -f tests/env/docker-compose.yml down -v --remove-orphans || true

      - name: Executor real-stack tests (Postgres + pgvector)
        run: bash tests/env/executor/run.sh

      - name: Tear down compose
        if: always()
        run: docker compose -f tests/env/docker-compose.yml down -v
