name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - feature/**

jobs:
  bootstrap-quality-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Validate repository structure
        run: node ./scripts/validate-structure.mjs
