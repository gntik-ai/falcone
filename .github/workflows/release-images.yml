name: release-images

# Build and publish the Falcone application container images to GHCR on every published
# GitHub Release. The release tag (e.g. v0.6.2) becomes the image version tag (0.6.2).
#
# Images are pushed to ghcr.io/<owner>/<image> using the workflow's GITHUB_TOKEN — no PAT
# required. After a release, deploy by pinning each component image tag to the release version.
#
# IMPORTANT — which runtime each image builds (the proven, deployable runtimes):
#   in-falcone-control-plane           deploy/kind/control-plane/Dockerfile  (server.mjs: validates the
#                                       Keycloak JWT and dispatches /v1/* to the real action modules)
#   in-falcone-control-plane-executor  apps/control-plane/Dockerfile         (main.mjs: the data-plane
#                                       executor that fronts the control-plane)
#   in-falcone-web-console             deploy/release/web-console.Dockerfile (static-server, numeric UID,
#                                       zero-write — compatible with the restricted security profile)
#   in-falcone-fn-runtime              deploy/kind/fn-runtime/Dockerfile     (nodejs function runtime)
#   in-falcone-workflow-worker         services/workflow-worker/Dockerfile   (Temporal DSL worker)
#   in-falcone-mcp-runtime             apps/mcp-runtime/Dockerfile           (first-party MCP JSON-RPC runtime)
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version to publish (e.g. 0.6.2 or v0.6.2). Used as the image tag.'
        required: true
      push_latest:
        description: 'Also tag/push :latest'
        type: boolean
        default: false
      publish_fn_runtime:
        description: 'Publish the function runtime image in this manual run'
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10.0.0'

jobs:
  build-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: in-falcone-control-plane
            dockerfile: deploy/kind/control-plane/Dockerfile
          - image: in-falcone-control-plane-executor
            dockerfile: apps/control-plane/Dockerfile
          - image: in-falcone-web-console
            dockerfile: deploy/release/web-console.Dockerfile
            build_spa: 'true'
          - image: in-falcone-fn-runtime
            dockerfile: deploy/kind/fn-runtime/Dockerfile
            context: deploy/kind/fn-runtime
          - image: in-falcone-workflow-worker
            dockerfile: services/workflow-worker/Dockerfile
          - image: in-falcone-mcp-runtime
            dockerfile: apps/mcp-runtime/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Resolve the version tag from the release (or the manual input) and the lowercase
      # owner (GHCR requires a lowercase namespace).
      - name: Resolve version and registry namespace
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            raw="${{ github.event.release.tag_name }}"
            latest="true"
          else
            raw="${{ github.event.inputs.tag }}"
            latest="${{ github.event.inputs.push_latest }}"
          fi
          version="${raw#v}"
          if [ -z "$version" ]; then echo "::error::empty version"; exit 1; fi
          owner="${{ github.repository_owner }}"
          owner_lc="$(echo "$owner" | tr '[:upper:]' '[:lower:]')"
          {
            echo "version=$version"
            echo "namespace=ghcr.io/${owner_lc}"
            echo "push_latest=$latest"
          } >> "$GITHUB_OUTPUT"
          echo "Publishing ${{ matrix.image }}:$version to ghcr.io/${owner_lc}"

      # The web-console SPA is built here (vite) so the thin nginx release image just copies
      # the dist. Other images build straight from their Dockerfile (repo-root context).
      - name: Setup pnpm
        if: matrix.build_spa == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        if: matrix.build_spa == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        if: matrix.build_spa == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build web-console SPA (vite)
        if: matrix.build_spa == 'true'
        run: pnpm --filter @in-falcone/web-console exec vite build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          base="${{ steps.meta.outputs.namespace }}/${{ matrix.image }}"
          {
            echo 'value<<EOF'
            echo "${base}:${{ steps.meta.outputs.version }}"
            if [ "${{ steps.meta.outputs.push_latest }}" = "true" ]; then
              echo "${base}:latest"
            fi
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build and push ${{ matrix.image }}
        if: github.event_name != 'workflow_dispatch' || matrix.image != 'in-falcone-fn-runtime' || inputs.publish_fn_runtime
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context || '.' }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          provenance: false
          tags: ${{ steps.tags.outputs.value }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
