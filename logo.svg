<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B2D5B"/>
      <stop offset="100%" stop-color="#0F1B3D"/>
    </linearGradient>
  </defs>

  <!-- Background: rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Falcon silhouette - geometric minimalist profile facing right -->
  <!-- Head + beak -->
  <path d="
    M 200 120
    C 180 120, 150 140, 145 170
    C 140 200, 150 230, 170 250
    L 175 255
    L 150 275
    L 130 290
    L 155 280
    L 175 268
    C 175 268, 180 290, 175 320
    C 170 350, 155 375, 145 395
    C 165 385, 185 365, 195 340
    C 205 315, 210 290, 210 270
    C 230 290, 260 310, 290 325
    C 320 340, 355 348, 390 350
    C 360 340, 330 325, 305 310
    C 280 295, 258 278, 240 260
    C 260 250, 280 235, 300 225
    C 320 215, 345 210, 375 210
    C 345 200, 315 195, 290 195
    C 265 195, 245 200, 228 210
    C 235 195, 230 175, 225 160
    C 220 130, 210 120, 200 120
    Z
  " fill="#C8A44E"/>

  <!-- Eye -->
  <circle cx="195" cy="175" r="10" fill="#0F1B3D"/>
  <circle cx="197" cy="173" r="3" fill="#C8A44E" opacity="0.6"/>

  <!-- Text: IN FALCONE -->
  <text x="256" y="445" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="52" letter-spacing="12" fill="#C8A44E">IN FALCONE</text>
  <line x1="120" y1="460" x2="392" y2="460" stroke="#C8A44E" stroke-width="1.5" opacity="0.4"/>
</svg>
