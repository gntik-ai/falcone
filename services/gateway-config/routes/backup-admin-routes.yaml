routes:
  - name: config-export-post
    uri: /v1/admin/tenants/*/config/export
    methods:
      - POST
    plugins:
      keycloak-openid-connect:
        enabled: true
        required_scopes:
          - platform:admin:config:export
      limit-req:
        rate: 5
        burst: 10
        key: consumer_name
      response-rewrite:
        headers:
          set:
            Cache-Control: "no-store"
    upstream:
      type: roundrobin
      timeout:
        connect: 5
        send: 30
        read: 30
      nodes:
        openwhisk-tenant-config-export: 1

  - name: config-export-domains-get
