routes:
  - name: plans-create
    uri: /v1/plans
    methods:
      - POST
    plugins:
      keycloak-openid-connect:
        enabled: true
      correlation-id:
        header_name: X-Correlation-Id
      prometheus:
        prefer_name: true
    upstream:
      type: roundrobin
      nodes:
        provisioning-orchestrator: 1

  - name: plans-list
