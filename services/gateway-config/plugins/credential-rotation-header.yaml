plugins:
  - name: key-auth
    config:
      key_names:
        - apikey
      hide_credentials: true
      allow_keys_array: true
  - name: response-rewrite
    config:
      headers:
        set:
          Credential-Deprecated: "true; expires=$credential_rotation_expires_at"
      vars:
        - - http_x_credential_rotation_state
          ==
          rotating_deprecated
  - name: serverless-post-function
    config:
      phase: access
      functions:
        - |
          return function(conf, ctx)
            local state = ngx.var.http_x_credential_rotation_state
            local expires = ngx.var.http_x_credential_rotation_expires_at
            if state == 'rotating_deprecated' and expires and expires ~= '' then
              ngx.header['Credential-Deprecated'] = 'true; expires=' .. expires
            end
          end
