# APISIX standalone route table for the Falcone HTTP request-chain slice.
#
# Families behind the gateway (all share the SAME auth + identity-injection
# plugin chain — APISIX's tinyyaml parser does NOT support YAML anchors, so the
# chain is inlined per route):
#   - scheduling                    /v1/scheduling/*                 (scheduling-engine)
#   - async-operation create/query  /v1/async-operations[ /{id} ]    (provisioning-orchestrator)
#   - tenant-config format-versions /v1/admin/config/format-versions (provisioning-orchestrator)
#   - plan catalog                  /v1/plans                        (provisioning-orchestrator, superadmin)
#   - quota dimension catalog       /v1/quota-dimensions             (provisioning-orchestrator, superadmin)
#   - tenant effective entitlements /v1/tenant/entitlements          (provisioning-orchestrator, tenant-scoped)
#
# PLUS one family that does NOT share the chain below (it authenticates itself):
#   - backup-status                 /v1/backups/status               (backup-status, IN-ACTION JWKS auth — plain proxy, see its route)
#
# Flow for every route (EXCEPT backup-status, which is a plain proxy):
#   1. openid-connect (bearer_only): validates the Keycloak access token against
#      the realm's discovery/JWKS. No token / bad token => 401 BEFORE the upstream
#      is ever reached.
#   2. serverless-pre-function: the token is now trusted; decode its payload and
#      inject the identity headers the actions read from the JWT claims:
#        x-tenant-id, x-workspace-id, x-auth-subject (sub), x-actor-roles (joined),
#        x-actor-type, x-actor-scopes (joined).
#      It STRIPS any client-supplied x-* identity headers first so a caller
#      cannot spoof identity (mirrors the gateway's request-validation contract).
#   3. proxy to the action-runner upstream.
#
# The serverless function body is identical across routes (extending it for one
# family is safe for the others, which simply ignore the extra headers).
#
# Out of scope for this slice (documented, not implemented here): the custom
# scope-enforcement Lua plugin and the web-console UI.

routes:
  - id: scheduling
    uri: /v1/scheduling/*
    methods:
      - GET
      - POST
      - PATCH
      - DELETE
    plugins:
      openid-connect:
        client_id: falcone-e2e-client
        client_secret: unused-public-client
        discovery: http://keycloak:8080/realms/falcone-e2e/.well-known/openid-configuration
        realm: falcone-e2e
        bearer_only: true
        use_jwks: true
        token_signing_alg_values_expected: RS256
        scope: openid
      serverless-pre-function:
        phase: rewrite
        functions:
          - |
            return function(conf, ctx)
              local core = require("apisix.core")
              local ngx = ngx
              core.request.set_header(ctx, "X-Tenant-Id", nil)
              core.request.set_header(ctx, "X-Workspace-Id", nil)
              core.request.set_header(ctx, "X-Auth-Subject", nil)
              core.request.set_header(ctx, "X-Actor-Roles", nil)
              core.request.set_header(ctx, "X-Actor-Type", nil)
              core.request.set_header(ctx, "X-Actor-Scopes", nil)
              local auth = core.request.header(ctx, "Authorization")
              if not auth then
                return 401, { code = "UNAUTHENTICATED", message = "missing bearer token" }
              end
              local token = auth:gsub("^[Bb]earer%s+", "")
              local b64 = token:match("^[^.]+%.([^.]+)%.")
              if not b64 then
                return 401, { code = "UNAUTHENTICATED", message = "malformed token" }
              end
              b64 = b64:gsub("-", "+"):gsub("_", "/")
              local pad = #b64 % 4
              if pad == 2 then b64 = b64 .. "=="
              elseif pad == 3 then b64 = b64 .. "="
              elseif pad == 1 then b64 = b64 .. "===" end
              local payload = ngx.decode_base64(b64)
              if not payload then
                return 401, { code = "UNAUTHENTICATED", message = "undecodable token" }
              end
              local claims, err = core.json.decode(payload)
              if not claims then
                return 401, { code = "UNAUTHENTICATED", message = "unparseable claims: " .. tostring(err) }
              end
              if claims.tenant_id then
                core.request.set_header(ctx, "X-Tenant-Id", tostring(claims.tenant_id))
              end
              if claims.workspace_id then
                core.request.set_header(ctx, "X-Workspace-Id", tostring(claims.workspace_id))
              end
              if claims.sub then
                core.request.set_header(ctx, "X-Auth-Subject", tostring(claims.sub))
              end
              local roles = claims.actor_roles
              if type(roles) == "table" then
                core.request.set_header(ctx, "X-Actor-Roles", table.concat(roles, ","))
              elseif roles ~= nil then
                core.request.set_header(ctx, "X-Actor-Roles", tostring(roles))
              end
              if claims.actor_type ~= nil then
                core.request.set_header(ctx, "X-Actor-Type", tostring(claims.actor_type))
              end
              local scopes = claims.actor_scopes
              if type(scopes) == "table" then
                core.request.set_header(ctx, "X-Actor-Scopes", table.concat(scopes, ","))
              elseif scopes ~= nil then
                core.request.set_header(ctx, "X-Actor-Scopes", tostring(scopes))
              end
            end
      proxy-rewrite:
        scheme: http
    upstream:
      type: roundrobin
      nodes:
        "action-runner:8090": 1

