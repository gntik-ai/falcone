# Falcone test environment — REAL backing services for integration tests.
#
# Brings up the in-cluster dependencies that Falcone services talk to, so changes
# can be exercised against real infrastructure (not mocks):
#   - postgres : per-service relational store (backup-status, openapi-sdk, ...)
#   - keycloak : internal IdP. Tenants map 1:1 to realms (realm name == tenantId);
#                a realm's displayName is the authoritative tenant name.
#   - redpanda : Kafka API broker (events, audit, CDC change streams).
#   - mongodb  : document store. Run as a single-node replica set (rs0) because
#                Falcone's CDC change streams require a replica set.
#   - minio    : S3-compatible object storage (workspace SDK artifacts, storage
#                config export). Bucket `falcone-test` created on `up`.
#   - vault    : secret store (dev mode). Emits a FILE audit log to a host-mounted
#                path that secret-audit-handler tails (VAULT_AUDIT_LOG_PATH).
#
# Lifecycle is driven by tests/env/up.sh (waits for health, provisions the admin
# service account, applies migrations, initiates the Mongo replica set, creates
# the MinIO bucket, enables the Vault file audit device) and tests/env/down.sh.
#
# OUT OF SCOPE here (these stay on the Kubernetes/Helm path): OpenWhisk/functions
# (too heavy for compose), the Falcone app + APISIX gateway containers (no
# Dockerfiles — services run in-process in tests), and observability.
name: falcone-testenv

services:
  postgres:
    # pgvector/pgvector:pg16 = official postgres:16 + the pgvector extension preinstalled.
    # Drop-in for the stock image (same POSTGRES_* env, entrypoint, pg_isready); required so
    # the vector-search real-stack probe can `CREATE EXTENSION vector` instead of self-skipping.
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: falcone
      POSTGRES_PASSWORD: falcone
      POSTGRES_DB: falcone_test
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U falcone -d falcone_test"]
      interval: 3s
      timeout: 3s
      retries: 20
    tmpfs:
      - /var/lib/postgresql/data  # ephemeral: clean DB every run

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: ["start-dev", "--import-realm", "--http-port=8080"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8081:8080"
    volumes:
      - ./keycloak/import:/opt/keycloak/data/import:ro
    healthcheck:
      # Keycloak 26 has no curl/wget; probe the master realm over bash /dev/tcp.
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo ok >&3"]
      interval: 5s
      timeout: 4s
      retries: 40

  redpanda:
    image: redpandadata/redpanda:v24.2.7
    command:
      - redpanda
      - start
      - --mode=dev-container
      - --smp=1
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092
    ports:
      - "19092:19092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 5s
      timeout: 5s
      retries: 40

  mongodb:
    image: mongo:7
    # Single-node replica set: Falcone CDC change streams require a replica set.
    # Replica-set initiation (rs.initiate) is performed by up.sh after health.
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "57017:27017"
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"db.adminCommand('ping').ok\" | grep -q 1"]
      interval: 5s
      timeout: 5s
      retries: 40
    tmpfs:
      - /data/db  # ephemeral: clean DB every run (matches the postgres pattern)

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "59000:9000"  # S3 API
      - "59001:9001"  # web console
    healthcheck:
      # The minio image ships curl; probe the live health endpoint.
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 4s
      retries: 40
    tmpfs:
      - /data  # ephemeral object storage

  vault:
    image: hashicorp/vault:1.18
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      # Address used by the in-container vault CLI (audit-enable in up.sh).
      VAULT_ADDR: http://localhost:8200
      VAULT_TOKEN: root
    command: ["server", "-dev"]
    ports:
      - "58200:8200"
    volumes:
      # Host-mounted audit dir so a host test process (secret-audit-handler) can
      # tail the file audit log written by the Vault file audit device.
      - ./vault/audit:/vault/audit
    healthcheck:
      # Dev server is auto-unsealed; `vault status` returns 0 when sealed=false.
      test: ["CMD-SHELL", "vault status >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 4s
      retries: 40
  # ---- HTTP request-chain slice ----------------------------------------------
  # action-runner: TEST-ONLY HTTP shim that adapts plain HTTP -> the OpenWhisk-
  # style product actions (params in / {statusCode,body} out) and injects a real
  # pg Pool. Imports the PRODUCT actions as-is from the bind-mounted repo. Most
  # families trust the gateway-injected identity headers; backup-status instead
  # validates the Bearer JWT itself against KEYCLOAK_JWKS_URL (in-action auth),
  # which is why this container carries DB_URL + KEYCLOAK_JWKS_URL env.
  action-runner:
    build:
      context: ./action-runner
    environment:
      PORT: "8090"
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: falcone
      PGPASSWORD: falcone
      PGDATABASE: falcone_test
      # backup-status family (in-action JWKS auth + own pg client). The shim
      # primes the .js repository's pg client with its shared pool via setClient
      # (DB_URL is the in-network host/port — NOT the host-published 55432). The
      # action validates the Bearer JWT itself against KEYCLOAK_JWKS_URL (the
      # in-network keycloak:8080, the realm the slice provisions). KEYCLOAK_ISSUER
      # / KEYCLOAK_AUDIENCE are intentionally LEFT UNSET so the action skips those
      # claim checks (the JWKS signature is the real gate); TEST_MODE is NOT set
      # (refused while a JWKS URL is configured); NODE_ENV stays non-production.
      DB_URL: postgres://falcone:falcone@postgres:5432/falcone_test
      KEYCLOAK_JWKS_URL: http://keycloak:8080/realms/falcone-e2e/protocol/openid-connect/certs
      NODE_ENV: test
    volumes:
      # Repo bind-mounted read-only so the shim imports services/ as-is.
      - ../../:/repo:ro
    ports:
      - "8090:8090"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:8090/healthz').then(r=>process.exit(r.status===200?0:1)).catch(()=>process.exit(1))\""]
      interval: 5s
      timeout: 4s
      retries: 20

  # apisix: API gateway. Standalone YAML config provider (no etcd). Validates the
  # Keycloak realm JWT and injects identity headers from JWT claims, then proxies
  # to action-runner. Config in ./apisix/apisix.yaml + ./apisix/config.yaml.
  apisix:
    image: apache/apisix:3.9.1-debian
    # NOTE: APISIX_STAND_ALONE is intentionally NOT set. With it, the entrypoint
    # rewrites config.yaml in place (fails on a bind mount the apisix user cannot
    # write). Our config.yaml already declares role: data_plane + config_provider:
    # yaml, so APISIX runs in standalone YAML mode purely from the mounted config.
    volumes:
      - ./apisix/config.yaml:/usr/local/apisix/conf/config.yaml:ro
      - ./apisix/apisix.yaml:/usr/local/apisix/conf/apisix.yaml:ro
    ports:
      - "9080:9080"
    depends_on:
      action-runner:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      # The apisix image has no curl/wget and the default CMD-SHELL is dash
      # (no /dev/tcp). Invoke bash explicitly to probe the proxy listener
      # (port open == data plane accepting connections).
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/9080 && echo ok >&3"]
      interval: 5s
      timeout: 4s
      retries: 30
