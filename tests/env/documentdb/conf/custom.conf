# DocumentDB engine SERVER-START GUCs (add-ferretdb-documentdb-engine).
# Mirrors charts/in-falcone/templates/documentdb-configmap.yaml. `shared_preload_libraries`
# is a context=postmaster GUC (read once before the postmaster starts; not session-settable
# and never delivered via POSTGRES_EXTRA_ARGS). The engine image also preloads these via its
# own bundled config; this file is the explicit, auditable declaration of the same set.
shared_preload_libraries = 'pg_cron,pg_documentdb_core,pg_documentdb'
cron.database_name = 'postgres'
