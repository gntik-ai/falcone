# Local image registry for kind (localhost:30500). Snapshotted from the live cluster
# before the campaign namespace nuke so it can be recreated (it is NOT helm-managed and
# has no committed manifest). registry:2, NodePort 30500, 2Gi PVC.
---
{
  "apiVersion": "v1",
  "kind": "PersistentVolumeClaim",
  "metadata": {
    "name": "registry-data",
    "namespace": "falcone"
  },
  "spec": {
    "accessModes": [
      "ReadWriteOnce"
    ],
    "resources": {
      "requests": {
        "storage": "2Gi"
      }
    },
    "storageClassName": "standard"
  }
}
---
{
  "apiVersion": "apps/v1",
  "kind": "Deployment",
  "metadata": {
    "labels": {
      "app": "registry"
    },
    "name": "registry",
    "namespace": "falcone"
  },
  "spec": {
    "progressDeadlineSeconds": 600,
    "replicas": 1,
    "revisionHistoryLimit": 10,
    "selector": {
      "matchLabels": {
        "app": "registry"
      }
    },
    "strategy": {
      "rollingUpdate": {
        "maxSurge": "25%",
        "maxUnavailable": "25%"
      },
      "type": "RollingUpdate"
    },
    "template": {
      "metadata": {
        "labels": {
          "app": "registry"
        }
      },
      "spec": {
        "containers": [
          {
            "image": "docker.io/library/registry:2",
            "imagePullPolicy": "IfNotPresent",
            "name": "registry",
            "ports": [
              {
                "containerPort": 5000,
                "protocol": "TCP"
              }
            ],
            "resources": {},
            "terminationMessagePath": "/dev/termination-log",
            "terminationMessagePolicy": "File",
            "volumeMounts": [
              {
                "mountPath": "/var/lib/registry",
                "name": "data"
              }
            ]
          }
        ],
        "dnsPolicy": "ClusterFirst",
        "restartPolicy": "Always",
        "schedulerName": "default-scheduler",
        "securityContext": {},
        "terminationGracePeriodSeconds": 30,
        "volumes": [
          {
            "name": "data",
            "persistentVolumeClaim": {
              "claimName": "registry-data"
            }
          }
        ]
      }
    }
  }
}
---
{
  "apiVersion": "v1",
  "kind": "Service",
  "metadata": {
    "labels": {
      "app": "registry"
    },
    "name": "registry",
    "namespace": "falcone"
  },
  "spec": {
    "externalTrafficPolicy": "Cluster",
    "internalTrafficPolicy": "Cluster",
    "ipFamilies": [
      "IPv4"
    ],
    "ipFamilyPolicy": "SingleStack",
    "ports": [
      {
        "nodePort": 30500,
        "port": 5000,
        "protocol": "TCP",
        "targetPort": 5000
      }
    ],
    "selector": {
      "app": "registry"
    },
    "sessionAffinity": "None",
    "type": "NodePort"
  }
}
