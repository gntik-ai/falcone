shared_expectations:
  required_host_keys:
    - api
    - console
    - identity
    - realtime
  required_resources:
    - Namespace
    - ConfigMap
    - Deployment
    - Service
  route_prefixes:
    controlPlane: /control-plane
    identity: /auth
    realtime: /realtime
    console: /
  logical_resources:
    - gateway-config
    - control-plane
    - web-console
    - public-exposure

smoke_scenarios:
  - id: SMOKE-DEV-K8S
    environment: dev
    platform: kubernetes
    expected_exposure_kind: Ingress
    expected_hostnames:
      api: api.dev.in-atelier.example.com
      console: console.dev.in-atelier.example.com
      identity: iam.dev.in-atelier.example.com
      realtime: realtime.dev.in-atelier.example.com
    required_resources:
      - Namespace
      - ConfigMap
      - Deployment
      - Service
      - Ingress
  - id: SMOKE-DEV-OCP
