api_contract:
  uri_prefix: /v1/
  version_header:
    name: X-API-Version
    current_value: 2026-03-24
  required_error_contracts: true
  compatibility_expectations:
    - Non-health control-plane operations stay under `/v1/` until a deliberate versioning change is introduced.
    - The current pinned API-version value remains `2026-03-24` for this contract generation.
    - Access-check routes remain tenant/workspace-scoped and carry explicit correlation metadata.
    - Backward-compatible additions may add optional fields but must preserve existing required fields and error shapes.
    - Breaking changes require an explicit versioning plan rather than silent contract drift.
