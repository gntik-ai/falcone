pyramid:
  - level: unit
    purpose: Validate pure policy logic, fixture builders, permission reducers, and contextual authorization resolution with no infrastructure.
    why_now: Gives the fastest feedback path while runtime stacks are still intentionally open.
    future_extensions:
      - tenant-context builders
      - permission evaluators
      - workspace-membership reducers
      - event-envelope serializers
  - level: adapter_integration
    purpose: Validate adapter behavior against local doubles and stable fixtures.
    why_now: Preserves payload, tenant-context, authorization-propagation, and retry semantics before real providers are wired in.
    future_extensions:
      - PostgreSQL adapters
      - object-storage adapters
      - external HTTP providers
      - authorization projection checks
  - level: api_contract
    purpose: Validate versioning, headers, error contracts, and schema expectations against the public API boundary.
    why_now: The repository already stores a control-plane OpenAPI contract that later stories must preserve.
    future_extensions:
      - consumer-driven contracts
      - compatibility snapshots
      - schema-diff policy gates
      - authorization decision endpoints
  - level: console_e2e
    purpose: Validate visible workflows, navigation, and permission boundaries from the user viewpoint.
    why_now: Console role/state expectations should be explicit before UI implementation begins.
    future_extensions:
      - browser automation
      - accessibility journeys
      - cross-tenant route protection
      - workspace-scoped navigation guards
  - level: resilience
    purpose: Validate degraded behavior, retries, replay safety, tenant-safe recovery, and operator visibility under failure.
    why_now: Multi-tenant systems need resilience expectations early even before live chaos tooling exists.
    future_extensions:
      - queue redelivery tests
      - dependency fault injection
      - operator console degradation flows
      - privilege-escalation replay guards
cross_domain_matrix:
  domains:
    - id: multi_tenant
      description: Tenant placement, workspace binding, context propagation, and boundary safety.
    - id: security
      description: Role and permission enforcement, version-header requirements, correlation metadata, and unsafe access prevention.
    - id: data
      description: Contracted reads/writes, lifecycle transitions, and storage-bound expectations.
    - id: events
      description: Event envelopes, retries, replay safety, and downstream integration behavior.
    - id: console
      description: UI routes, visible sections, state transitions, and actor-facing feedback.
  scenarios:
    - id: UT-TEN-001
      level: unit
      domain: multi_tenant
      taxonomy: negative
      title: Tenant context builder rejects a request without tenant binding metadata.
      fixtures:
        - tenant-shared-a
        - user-tenant-admin-a
      expected: Missing tenant context is rejected before any adapter or console flow begins.
    - id: UT-TEN-002
      level: unit
      domain: multi_tenant
      taxonomy: negative
      title: Workspace context resolver rejects a workspace that is outside the resolved tenant binding.
      fixtures:
        - tenant-shared-a
        - workspace-beta-dev
        - user-workspace-admin-alpha
      expected: Workspace identifiers cannot be reused across tenant boundaries or mismatched memberships.
    - id: UT-SEC-001
      level: unit
      domain: security
      taxonomy: permission
      title: Permission reducer denies tenant operator access to billing-admin actions.
      fixtures:
        - user-tenant-operator-a
        - route-platform-overview
      expected: Tenant operator permissions remain tenant-scoped and platform-only actions stay blocked.
    - id: UT-SEC-002
      level: unit
      domain: security
      taxonomy: permission
      title: Workspace developer cannot manage tenant membership or workspace administration actions.
      fixtures:
        - user-workspace-dev-alpha
        - workspace-alpha-dev
      expected: Workspace roles cannot escalate into tenant-admin responsibilities.
    - id: AI-DAT-001
      level: adapter_integration
      domain: data
      taxonomy: contract
      title: Adapter mapping preserves tenant placement fields for shared and dedicated tenants.
      fixtures:
        - tenant-shared-a
        - tenant-dedicated-a
        - adapter-control-plane-stub
      expected: Placement metadata remains canonical across adapter boundaries.
    - id: AI-EVT-001
      level: adapter_integration
      domain: events
      taxonomy: positive
      title: Event publisher attaches tenant context and idempotency metadata to outbound lifecycle events.
      fixtures:
        - adapter-event-bus-stub
        - event-tenant-provision-requested
        - tenant-shared-a
      expected: Outbound event envelopes are stable and replay-aware before provider integration.
    - id: AI-SEC-002
      level: adapter_integration
      domain: security
      taxonomy: contract
      title: Adapter calls preserve correlation id, effective roles, and workspace binding when the authorization context is projected downstream.
      fixtures:
        - adapter-object-storage-stub
        - user-workspace-admin-alpha
        - workspace-alpha-dev
      expected: Adapter-facing metadata remains authorization-safe and does not silently drop workspace scope.
    - id: AC-DAT-001
      level: api_contract
      domain: data
      taxonomy: contract
      title: Business routes stay under the v1 URI prefix and return explicit error contracts.
      fixtures:
        - api-version-current
      expected: Contract validation fails if business endpoints leave `/v1/` or lose error responses.
    - id: AC-SEC-001
      level: api_contract
      domain: security
      taxonomy: contract
      title: Non-health control-plane operations require the pinned API version header.
      fixtures:
        - api-version-current
      expected: Contract validation fails if `X-API-Version` becomes optional or drifts from the current value.
    - id: AC-SEC-002
      level: api_contract
      domain: security
      taxonomy: contract
      title: Workspace access-check operations require correlation metadata and return explicit authorization decisions.
      fixtures:
        - api-version-current
      expected: Access-check routes preserve tenant/workspace scoping, correlation headers, and explicit allow or deny semantics.
    - id: CE-CON-001
      level: console_e2e
      domain: console
      taxonomy: positive
      title: Unauthenticated users are redirected to login and cannot see tenant or platform navigation.
      fixtures:
        - route-login
        - route-tenant-dashboard
      states:
        - unauthenticated
      expected: Public entry points stay limited to authentication and recovery routes.
    - id: CE-SEC-001
      level: console_e2e
      domain: security
      taxonomy: permission
      title: Tenant admin can manage tenant resources but cannot access platform-wide control surfaces.
      fixtures:
        - user-tenant-admin-a
        - route-tenant-dashboard
        - route-platform-overview
      states:
        - tenant_admin
      expected: Tenant admin workflows stay within the tenant boundary.
    - id: CE-SEC-002
      level: console_e2e
      domain: security
      taxonomy: permission
      title: Workspace admin can manage one workspace but cannot see platform-wide or cross-tenant navigation.
      fixtures:
        - user-workspace-admin-alpha
        - route-workspace-dashboard
        - route-platform-overview
      states:
        - workspace_admin
      expected: Workspace-scoped roles stay inside one workspace and do not inherit tenant-wide or platform-wide surfaces.
    - id: RS-EVT-001
      level: resilience
      domain: events
      taxonomy: resilience
      title: Provider timeout reclassifies the operation for retry without duplicating the event envelope.
      fixtures:
        - resilience-provider-timeout
        - event-tenant-provision-requested
        - adapter-event-bus-stub
      expected: Retry intent is explicit and duplicate side effects remain suppressed.
    - id: RS-EVT-002
      level: resilience
      domain: events
      taxonomy: resilience
      title: Idempotent retry reuses the original create or provision acceptance instead of duplicating side effects.
      fixtures:
        - resilience-idempotent-retry
        - event-tenant-provision-requested
        - tenant-shared-a
      expected: Safe retries preserve one logical acceptance, one correlation chain, and one downstream mutation envelope.
    - id: RS-EVT-003
      level: resilience
      domain: events
      taxonomy: resilience
      title: Event gateway load stays bounded for concurrent subscriptions and sustained publishing.
      fixtures:
        - resilience-event-gateway-load
        - event-workspace-document-updated
        - tenant-shared-a
      expected: Concurrent sessions and publish bursts stay inside documented limits, and excess work is rejected predictably instead of buffering without bound.
    - id: RS-TEN-001
      level: resilience
      domain: multi_tenant
      taxonomy: recovery
      title: Tenant placement recovery preserves tenant identity and prevents cross-tenant failover leakage.
      fixtures:
        - resilience-tenant-failover
        - tenant-shared-a
        - tenant-dedicated-a
      expected: Recovery paths preserve the logical tenant contract and isolation boundary.
    - id: RS-SEC-001
      level: resilience
      domain: security
      taxonomy: resilience
      title: Replay or escalation attempts cannot widen delegated authorization after the original context was denied or narrowed.
      fixtures:
        - resilience-privilege-escalation
        - user-workspace-admin-alpha
        - workspace-alpha-dev
      expected: Replayed or mutated authorization context remains denied and fully traceable by correlation id.
    - id: RS-SEC-002
      level: resilience
      domain: security
      taxonomy: resilience
      title: Gateway rejects spoofed downstream auth-context headers with the standard correlation-bearing error envelope.
      fixtures:
        - resilience-invalid-headers
        - api-version-current
      expected: Client-supplied trust headers are blocked before they can reach the control plane or adapters.
    - id: RS-DAT-002
      level: resilience
      domain: data
      taxonomy: resilience
      title: Oversized provisioning payloads are rejected at the gateway before any control-plane side effects begin.
      fixtures:
        - resilience-oversized-body
        - tenant-shared-a
        - workspace-alpha-dev
      expected: Body-size enforcement fails fast, returns the standard error envelope, and preserves tenant-safe retry guidance.
    - id: CE-CON-002
      level: console_e2e
      domain: console
      taxonomy: positive
      title: Pending-activation accounts only see the activation waiting room until a superadmin approves the signup.
      fixtures:
        - route-pending-activation
        - route-login
      states:
        - pending_activation
      expected: Pending-activation users stay blocked from tenant and platform navigation until approval resolves the account.
    - id: CE-CON-003
      level: console_e2e
      domain: console
      taxonomy: recovery
      title: Expired credentials route the operator into password recovery instead of silently failing login loops.
      fixtures:
        - route-credentials-expired
        - route-password-recovery
      states:
        - credentials_expired
      expected: Credential-expiry states expose recovery-only actions until the password reset completes.
    - id: CE-CON-004
      level: console_e2e
      domain: console
      taxonomy: negative
      title: Suspended accounts render an explicit blocked status screen and never regain navigation by refreshing the SPA.
      fixtures:
        - route-account-suspended
        - route-login
      states:
        - account_suspended
      expected: Suspended accounts stay blocked from every tenant and platform surface until an operator reactivates them.
scenario_taxonomy:
  categories:
    - id: positive
      meaning: Expected success path using valid actor, tenant, and contract inputs.
    - id: negative
      meaning: Unsafe or incomplete input is rejected before side effects occur.
    - id: permission
      meaning: Access control, visibility, or route boundary expectations.
    - id: contract
      meaning: Public schema, version, or integration contract expectations.
    - id: resilience
      meaning: Failure classification, retry, timeout, or degraded behavior.
    - id: recovery
      meaning: Explicit recovery, replay, rollback, or restoration path expectations.
  naming:
    format: <layer-code>-<domain-code>-<sequence>
    examples:
      - UT-TEN-001
      - AI-EVT-001
      - CE-CON-001
