version: 2026-03-28

surface_contracts:
  scraping:
    - metrics_stack
    - health_checks
  dashboards:
    - dashboards
    - metrics_stack
  health:
    - health_checks
    - console_alerts

shared_expectations:
  required_scopes:
    - platform
    - tenant
    - workspace
  required_dashboard_scopes:
    - global
    - tenant
    - workspace
  required_health_statuses:
    - healthy
    - degraded
    - unavailable
    - stale
    - unknown
  required_probe_types:
    - liveness
    - readiness
    - health
  required_subsystems:
    - apisix
    - kafka
    - postgresql
    - mongodb
    - openwhisk
    - storage
    - control_plane
  required_dashboard_widget_ids:
    - apisix-health
    - kafka-health
    - postgresql-health
    - mongodb-health
    - openwhisk-health
    - storage-health
    - control-plane-health
  required_dimension_ids:
    - availability
    - errors
    - latency
    - throughput
    - collection_freshness
  required_metric_family_ids:
    - component_up
    - component_operations_total
    - component_operation_errors_total
    - component_operation_duration_seconds
  required_collection_health:
    metric_name: in_atelier_observability_collection_health
    failure_counter: in_atelier_observability_collection_failures_total
    lag_metric: in_atelier_observability_collection_lag_seconds
  freshness_threshold_seconds: 120
  masking_policy_forbidden_content_categories:
    - password
    - secret
    - token
    - connection_string
    - raw_hostname
    - raw_endpoint
    - user_id
    - email
    - object_key
    - raw_topic_name

smoke_scenarios:
  - id: SMOKE-OBS-SCRAPE-PLATFORM
    focus: scraping
    scope: platform
    expected_dashboard_scope: global
    required_subsystems:
      - apisix
      - kafka
      - postgresql
      - mongodb
      - openwhisk
      - storage
      - control_plane
    required_collection_health:
      metric_name: in_atelier_observability_collection_health
      failure_counter: in_atelier_observability_collection_failures_total
      lag_metric: in_atelier_observability_collection_lag_seconds

  - id: SMOKE-OBS-DASHBOARD-GLOBAL
    focus: dashboards
    scope: platform
    dashboard_scope: global
    required_dimensions:
      - availability
      - errors
      - latency
      - throughput
      - collection_freshness
    required_widgets:
      - apisix-health
      - kafka-health
      - postgresql-health
      - mongodb-health
      - openwhisk-health
      - storage-health
      - control-plane-health

  - id: SMOKE-OBS-DASHBOARD-TENANT
    focus: dashboards
    scope: tenant
    dashboard_scope: tenant
    required_dimensions:
      - availability
      - errors
      - latency
      - throughput
      - collection_freshness
    required_widgets:
      - apisix-health
      - kafka-health
      - postgresql-health
      - mongodb-health
      - openwhisk-health
      - storage-health
      - control-plane-health

  - id: SMOKE-OBS-DASHBOARD-WORKSPACE
    focus: dashboards
    scope: workspace
    dashboard_scope: workspace
    required_dimensions:
      - availability
      - errors
      - latency
      - throughput
      - collection_freshness
    required_widgets:
      - apisix-health
      - kafka-health
      - postgresql-health
      - mongodb-health
      - openwhisk-health
      - storage-health
      - control-plane-health

  - id: SMOKE-OBS-HEALTH-PLATFORM
    focus: health
    scope: platform
    probe_types:
      - liveness
      - readiness
      - health
    required_statuses:
      - healthy
      - degraded
      - unavailable
      - stale
      - unknown
    freshness_threshold_seconds: 120
    required_components:
      - apisix
      - kafka
      - postgresql
      - mongodb
      - openwhisk
      - storage
      - control_plane
    scope_isolation: platform_visible

  - id: SMOKE-OBS-HEALTH-TENANT
    focus: health
    scope: tenant
    probe_types:
      - health
    required_statuses:
      - healthy
      - degraded
      - unavailable
      - stale
      - unknown
    freshness_threshold_seconds: 120
    required_components:
      - apisix
      - kafka
      - postgresql
      - mongodb
      - openwhisk
      - storage
      - control_plane
    scope_isolation: attributed_only

  - id: SMOKE-OBS-HEALTH-WORKSPACE
    focus: health
    scope: workspace
    probe_types:
      - health
    required_statuses:
      - healthy
      - degraded
      - unavailable
      - stale
      - unknown
    freshness_threshold_seconds: 120
    required_components:
      - apisix
      - kafka
      - postgresql
      - mongodb
      - openwhisk
      - storage
      - control_plane
    scope_isolation: attributed_only
