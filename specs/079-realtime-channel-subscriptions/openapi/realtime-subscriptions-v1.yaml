openapi: 3.1.0
info:
  title: Realtime Subscriptions API
  version: v1
paths:
  /api/v1/workspaces/{workspaceId}/realtime/channels:
    get:
      summary: List channels
      parameters:
        - in: path
          name: workspaceId
          required: true
          schema: { type: string }
      responses:
        '200': { description: OK }
  /api/v1/workspaces/{workspaceId}/realtime/subscriptions:
    get: { summary: List subscriptions, responses: { '200': { description: OK } } }
    post: { summary: Create subscription, responses: { '201': { description: Created }, '400': { description: Invalid request }, '409': { description: Quota exceeded } } }
  /api/v1/workspaces/{workspaceId}/realtime/subscriptions/{id}:
    get: { summary: Get subscription, responses: { '200': { description: OK }, '404': { description: Not found } } }
    patch: { summary: Update subscription, responses: { '200': { description: OK }, '409': { description: Invalid status transition } } }
    delete: { summary: Delete subscription, responses: { '204': { description: Deleted } } }
  /api/v1/tenants/{tenantId}/realtime/subscriptions/summary:
    get: { summary: Tenant summary, responses: { '200': { description: OK } } }
