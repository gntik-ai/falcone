- id: backup-audit-get
  uri: /v1/backup/audit
  methods: [GET]
  upstream_id: openwhisk-query-audit
  plugins:
    openid-connect:
      discovery: "${KEYCLOAK_DISCOVERY_URL}"
      required_scopes: ["backup-audit:read:own"]
    limit-req:
      rate: 20
      burst: 40
      key: consumer_name
    response-rewrite:
      headers:
        Cache-Control: "no-store, no-cache"
        X-Content-Type-Options: "nosniff"
