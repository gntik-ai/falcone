  # ---- Anon/service API-key data-plane routes (Supabase-style) ----
  # Selected by the `apikey: flc_...` header (vars), at higher priority than the JWT
  # data routes (2005-2008 above) so a key request wins; without the header the request
  # falls through to the JWT route -> control-plane. These forward to the EXECUTOR, which
  # verifies the key and derives tenant/workspace FROM the key (authoritative over any
  # client-supplied identity header). cors-only — no JWT enforcement at the gateway.
  - id: "2005-key"
    uri: "/v1/postgres/*"
    priority: 335
    methods: ["GET", "POST", "PUT", "PATCH", "DELETE", "OPTIONS"]
    vars:
      - ["http_apikey", "~~", "^flc_"]
    plugins:
      cors: {}
    upstream:
      type: roundrobin
      scheme: http
      nodes:
        "falcone-cp-executor.falcone.svc.cluster.local:8080": 1
  - id: "2006-key"
    uri: "/v1/mongo/*"
    priority: 334
    methods: ["GET", "POST", "PUT", "PATCH", "DELETE", "OPTIONS"]
    vars:
      - ["http_apikey", "~~", "^flc_"]
    plugins:
      cors: {}
    upstream:
      type: roundrobin
      scheme: http
      nodes:
        "falcone-cp-executor.falcone.svc.cluster.local:8080": 1
  - id: "2007-key"
    uri: "/v1/events/*"
    priority: 333
    methods: ["GET", "POST", "PUT", "PATCH", "DELETE", "OPTIONS"]
    vars:
      - ["http_apikey", "~~", "^flc_"]
    plugins:
      cors: {}
    upstream:
