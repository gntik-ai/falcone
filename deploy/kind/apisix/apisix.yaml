  # ---- Realtime change stream (SSE) -> executor ----
  # Read-only; a browser EventSource cannot set headers, so the anon key arrives as ?apikey=
  # and the executor verifies it. Long upstream timeout keeps the SSE stream open.
  - id: "2016-rt"
    uri: "/v1/realtime/*"
    priority: 340
    methods: ["GET", "OPTIONS"]
    vars:
      # matches both Mongo (collections/{c}/changes) and Postgres (tables/{t}/changes)
      - ["uri", "~~", "/changes$"]
    plugins:
      cors: {}
      proxy-rewrite:
        headers:
          set:
            x-tenant-id: ""
            x-workspace-id: ""
            x-auth-subject: ""
            x-actor-roles: ""
            x-gateway-auth: "${{GATEWAY_SHARED_SECRET}}"
      limit-count:
        count: 120
        time_window: 60
        rejected_code: 429
        key_type: var_combination
        key: $http_apikey$arg_apikey
        allow_degradation: false
    upstream:
      type: roundrobin
      scheme: http
      timeout:
        connect: 5
        send: 3600
        read: 3600
      nodes:
        "falcone-cp-executor.falcone.svc.cluster.local:8080": 1
  # ---- API-key issuance/management -> executor ----
  # Matches just the api-keys subpath at higher priority than the generic /v1/workspaces/*
  # route (2003 -> control-plane). Admin (Bearer JWT) auth: APISIX forwards the Authorization
  # header and the executor verifies the JWT itself (KEYCLOAK_JWKS_URL) — the standalone
  # gateway does not inject x-tenant-id, so the executor is the auth authority here.
  # SECURITY (#488): strip client-supplied identity headers and inject x-gateway-auth so
  # the executor knows the request was forwarded by the authenticated gateway.
  - id: "2003-keys"
    uri: "/v1/workspaces/*"
    priority: 337
    methods: ["GET", "POST", "PUT", "PATCH", "DELETE", "OPTIONS"]
    vars:
      - ["uri", "~~", "^/v1/workspaces/[^/]+/api-keys"]
    plugins:
      cors: {}
      proxy-rewrite:
        headers:
          set:
            x-tenant-id: ""
            x-workspace-id: ""
            x-auth-subject: ""
            x-actor-roles: ""
            x-gateway-auth: "${{GATEWAY_SHARED_SECRET}}"
    upstream:
      type: roundrobin
      scheme: http
      nodes:
        "falcone-cp-executor.falcone.svc.cluster.local:8080": 1
  # Catch-all so EVERY /v1/* the console calls reaches the control-plane server,
  # which validates the Bearer JWT itself and dispatches to the real action
  # (unmapped paths -> a clean 404 from the control-plane, not the gateway).
  # Priority above the web-console SPA catch-all (/* @ 10) so /v1 wins; below the
  # specific /v1/<family> routes above (which target the same upstream anyway).
  - id: "5000"
    uri: "/v1/*"
    priority: 50
    methods: ["GET", "POST", "PUT", "PATCH", "DELETE", "OPTIONS"]
    plugins:
      cors: {}
    upstream:
      type: roundrobin
      scheme: http
      nodes:
        "falcone-control-plane.falcone.svc.cluster.local:8080": 1
#END
