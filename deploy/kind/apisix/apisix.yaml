  # ---- Anon/service API-key data-plane routes (Supabase-style) ----
  # Selected by the `apikey: flc_...` header (vars), at higher priority than the JWT
  # data routes (2005-2008 above) so a key request wins; without the header the request
  # falls through to the JWT route -> control-plane. These forward to the EXECUTOR, which
  # verifies the key and derives tenant/workspace FROM the key (authoritative over any
  # client-supplied identity header).
  #
  # SECURITY (fix-gateway-authn-and-strip-tenant-headers #488): All executor-bound routes
  # strip inbound x-tenant-id / x-workspace-id / x-auth-subject / x-actor-roles headers
  # from the client request (proxy-rewrite: set header to "" = remove) and inject
  # x-gateway-auth with the shared secret so the executor can verify the request came from
  # the authenticated gateway, not from an unauthenticated direct caller. The secret value
  # MUST be kept in sync with GATEWAY_SHARED_SECRET on the executor deployment.
  #
  # NOTE: full OIDC/JWT auth plugin wiring on these executor routes is a tracked follow-up
  # (see tasks.md task 2.1). The header-strip + x-gateway-auth injection closes the primary
  # exploit (unauthenticated header-only impersonation) in combination with the executor
  # gate added in server.mjs. API-key auth for data-plane routes is verified by the executor.
  - id: "2005-key"
    uri: "/v1/postgres/*"
    priority: 335
    methods: ["GET", "POST", "PUT", "PATCH", "DELETE", "OPTIONS"]
    vars:
      - ["http_apikey", "~~", "^flc_"]
    plugins:
      cors: {}
      # Strip client-supplied identity headers and inject the gateway trust signal.
      proxy-rewrite:
        headers:
          set:
            x-tenant-id: ""
            x-workspace-id: ""
            x-auth-subject: ""
            x-actor-roles: ""
            # x-gateway-auth value is the shared secret; must match GATEWAY_SHARED_SECRET
            # on the executor. Set via a Helm-rendered secret or env substitution in prod.
            # Placeholder for the kind dev install — replace with the real value or mount
            # from a Kubernetes Secret via APISIX environment variable interpolation.
            x-gateway-auth: "${{GATEWAY_SHARED_SECRET}}"
      # Per-key rate limit (noisy-neighbor guard for the public anon/service surface).
      limit-count:
        count: 120
        time_window: 60
        rejected_code: 429
        key_type: var_combination
        key: $http_apikey
        allow_degradation: false
    upstream:
      type: roundrobin
      scheme: http
      nodes:
        "falcone-cp-executor.falcone.svc.cluster.local:8080": 1
