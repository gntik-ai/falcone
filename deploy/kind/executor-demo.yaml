# Live demo of the BaaS data-API executor (apps/control-plane) on kind.
# Standalone Deployment in the `falcone` namespace — does NOT touch the existing
# control-plane/SPA. Credentials come from the existing in-falcone-postgresql secret
# via secretKeyRef (no plaintext, no probing).
#
#   kubectl apply -f deploy/kind/executor-demo.yaml
#   kubectl -n falcone wait --for=condition=complete job/cp-executor-setup --timeout=120s
#   kubectl -n falcone rollout status deploy/falcone-cp-executor
#   kubectl -n falcone port-forward svc/falcone-cp-executor 8088:8080
---
# Master key that AES-256-GCM-encrypts per-trigger webhook HMAC secrets at rest (#636). Self-
# contained so the kind dev executor boots (it now fails closed without this key under
# NODE_ENV=production instead of using the old hardcoded 'flow-trigger-dev-master-key' default).
# This is a kind-LOCAL placeholder, NOT a production secret — a real deployment provisions its own
# high-entropy value; the point is that the value is per-deployment, not a universal code constant.
apiVersion: v1
kind: Secret
metadata:
  name: in-falcone-flow-trigger-secret
  namespace: falcone
type: Opaque
stringData:
  secret: "kind-local-dev-flow-trigger-master-key-override-in-production"
---
# One-time setup (runs as the postgres SUPERUSER): pgcrypto + the non-superuser roles
# the API keys resolve to, granted to `falcone` so the executor can SET ROLE to them.
apiVersion: batch/v1
kind: Job
metadata:
  name: cp-executor-setup
  namespace: falcone
  labels: { app: falcone-cp-executor, role: setup }
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels: { app: falcone-cp-executor, role: setup }
    spec:
      restartPolicy: Never
      containers:
        - name: psql
          image: docker.io/bitnamilegacy/postgresql:17.2.0
          env:
            - { name: PGHOST, value: falcone-postgresql }
            - { name: PGPORT, value: "5432" }
            - { name: PGUSER, value: postgres }
            - { name: PGDATABASE, value: in_falcone }
            - name: PGPASSWORD
              valueFrom: { secretKeyRef: { name: in-falcone-postgresql, key: POSTGRESQL_POSTGRES_PASSWORD } }
          command: ["bash", "-ec"]
          args:
            - |
              psql -v ON_ERROR_STOP=1 <<'SQL'
              CREATE EXTENSION IF NOT EXISTS pgcrypto;
              SELECT 'CREATE ROLE falcone_anon NOSUPERUSER NOBYPASSRLS'
                WHERE NOT EXISTS (SELECT FROM pg_roles WHERE rolname='falcone_anon')\gexec
              SELECT 'CREATE ROLE falcone_service NOSUPERUSER NOBYPASSRLS'
                WHERE NOT EXISTS (SELECT FROM pg_roles WHERE rolname='falcone_service')\gexec
              GRANT falcone_anon TO falcone;
              GRANT falcone_service TO falcone;
              GRANT CREATE, USAGE ON SCHEMA public TO falcone;
              GRANT USAGE ON SCHEMA public TO falcone_anon, falcone_service;
              -- Enable per-workspace DEDICATED database login roles (#686). Workspace DB
              -- provisioning (dataplane.mjs::provisionWorkspaceDatabase) mints a dedicated,
              -- independently-rotatable `wsdb_<...>_app` LOGIN role + password and makes it the
              -- DB owner ONLY when the provisioning role has CREATEROLE; otherwise it degrades to
              -- `mode: shared` (the single `falcone` login) and credential rotation is an inert
              -- no-op. Granting CREATEROLE here lets `falcone` create those per-workspace roles so
              -- rotation performs a REAL rotation (POST .../database/credential-rotations).
              -- Grant ONLY CREATEROLE — `falcone` stays NOSUPERUSER/NOBYPASSRLS. Under PG17 a
              -- non-superuser CREATEROLE grantee can only administer roles it itself creates and
              -- CANNOT escalate to superuser, so this is a bounded, safe privilege.
              ALTER ROLE falcone CREATEROLE;
              -- NOTE: the blanket ALTER DEFAULT PRIVILEGES that previously granted
              -- SELECT, INSERT, UPDATE, DELETE on ALL tables to falcone_service/falcone_anon
              -- has been REMOVED (PG-3 fix, #490). That grant was overly broad and allowed
              -- data roles to read control-plane tables (workspace_api_keys, etc.).
              -- Per-table grants are now applied explicitly by the DDL executor at table
              -- creation time (tracked in fix-postgres-ddl-grants-and-rls / B1 / #494).
              SQL
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: falcone-cp-executor
  namespace: falcone
  labels: { app: falcone-cp-executor }
spec:
  replicas: 1
  selector:
    matchLabels: { app: falcone-cp-executor }
  template:
    metadata:
      # `app` is the Service selector; `app.kubernetes.io/name: control-plane-executor`
      # is the contract the FerretDB (and SeaweedFS/Kafka) NetworkPolicies' ingress
      # allowlists match on (ferretdb.networkPolicy.allowedAppComponents). Without it,
      # kindnet drops the executor->FerretDB TCP and mongo CRUD times out (500). (#559)
      labels:
        app: falcone-cp-executor
        app.kubernetes.io/name: control-plane-executor
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000          # node:22-alpine "node" user (numeric, so k8s can verify non-root)
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: control-plane
          image: localhost:30500/in-falcone-control-plane-executor:0.9.3
          # Always re-pull (fix-campaign-image-pull-policy, #561): install.sh rewrites this tag to
          # the reusable campaign tag and re-pushes the rebuilt image to the local registry
          # (localhost:30500). With IfNotPresent the kind node kept the stale cached layer, so a
          # rebuilt executor silently ran the OLD code until a manual re-pull. Always pulls the
          # freshly-pushed image from the in-cluster registry on every (re)deploy.
          imagePullPolicy: Always
          ports:
            - { containerPort: 8080, name: http }
          env:
            - { name: NODE_ENV, value: production }
            - { name: PORT, value: "8080" }
            # MCP self-call base URL: a published MCP tool-call mediates by self-calling this
            # executor's own HTTP server (data-plane routes served locally; everything else proxied
            # to CONTROL_PLANE_UPSTREAM). Pinned explicitly so the self-call is robust regardless of
            # how PORT is resolved; without it a tool-call could hit the executor index (#565).
            - { name: MCP_SELF_BASE_URL, value: "http://127.0.0.1:8080" }
            # Fallthrough proxy: routes the executor does NOT serve (browse/inventory/
            # management) are forwarded to the real control-plane runtime.
            - { name: CONTROL_PLANE_UPSTREAM, value: "http://falcone-control-plane:8080" }
            - { name: PGHOST, value: falcone-postgresql }
            - { name: PGPORT, value: "5432" }
            - { name: PGUSER, value: falcone }
            - { name: PGDATABASE, value: in_falcone }
            - name: PGPASSWORD
              valueFrom: { secretKeyRef: { name: in-falcone-postgresql, key: POSTGRESQL_PASSWORD } }
            # Document API — FerretDB gateway over the DocumentDB engine (MongoDB-wire).
            - { name: MONGO_HOST, value: "falcone-ferretdb:27017" }
            - { name: MONGO_BACKEND, value: ferretdb }
            # FerretDB v2 delegates auth to Postgres: MONGO_USER must be the documentdb admin
            # role, sourced from the same secret as the password (not a hardcoded `falcone`, which
            # mismatched the admin role and failed the handshake — finding F2).
            - { name: MONGO_USER, valueFrom: { secretKeyRef: { name: in-falcone-documentdb, key: POSTGRES_USER } } }
            - name: MONGO_PASSWORD
              valueFrom: { secretKeyRef: { name: in-falcone-documentdb, key: POSTGRES_PASSWORD } }
            # Realtime CDC/SSE: replication-privileged DocumentDB URL. createRealtimeExecutor
            # (apps/control-plane/src/runtime/main.mjs) activates the realtime executor ONLY when
            # this is set; without it /v1/realtime/* returns 501 REALTIME_DISABLED even though the
            # replication secret holds the value (#621). Sourced from the documentdb replication
            # secret and `optional: true` so the executor still starts (realtime stays disabled)
            # when the secret/key is absent — consistent with the controlPlaneExecutor stanza in
            # tests/live-campaign/values-campaign.yaml.
            - name: REALTIME_DOCUMENTDB_URL
              valueFrom:
                secretKeyRef:
                  name: in-falcone-documentdb-replication
                  key: realtime-url
                  optional: true
            # Kafka (enables the events API); Functions use the local backend by default.
            - { name: KAFKA_BROKERS, value: "falcone-kafka:9092" }
            # Verify Bearer JWTs directly (Keycloak platform realm) so admin requests —
            # e.g. API-key issuance — authenticate without the gateway injecting x-tenant-id.
            - { name: KEYCLOAK_JWKS_URL, value: "http://falcone-keycloak:8080/realms/in-falcone-platform/protocol/openid-connect/certs" }
            # Gateway trust signal (fix-executor-ddl-db-ownership-guard, B3): without this,
            # the executor trusted client-supplied x-tenant-id/x-workspace-id headers
            # UNCONDITIONALLY (legacy dev mode), so a direct (non-gateway) caller could spoof
            # any tenant/workspace. APISIX (helm-deployed) already injects a matching
            # x-gateway-auth from this SAME secret, so legitimate gateway traffic is unaffected
            # while direct header-spoofing now fails closed (401).
            - name: GATEWAY_SHARED_SECRET
              valueFrom: { secretKeyRef: { name: in-falcone-gateway-shared-secret, key: secret } }
            # Master key for per-trigger webhook secret encryption. REQUIRED: the executor runs
            # NODE_ENV=production and the code fails closed without it (#636), never falling back to
            # a hardcoded default. Sourced from a Secret so it is not visible in the Deployment spec.
            - name: FLOW_TRIGGER_SECRET_KEY
              valueFrom: { secretKeyRef: { name: in-falcone-flow-trigger-secret, key: secret } }
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 3
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          resources:
            requests: { cpu: 50m, memory: 96Mi }
            limits: { cpu: 500m, memory: 256Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: falcone-cp-executor
  namespace: falcone
  labels: { app: falcone-cp-executor }
spec:
  selector: { app: falcone-cp-executor }
  ports:
    - { port: 8080, targetPort: 8080, name: http }
