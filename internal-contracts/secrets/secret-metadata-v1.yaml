openapi: 3.0.3
info:
  title: Secret Metadata Detail API
  version: 1.0.0
paths:
  /v1/secrets/{domain}/{path}:
    get:
      parameters:
        - in: path
          name: domain
          required: true
          schema:
            type: string
            enum: [platform, tenant, functions, gateway, iam]
        - in: path
          name: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Secret metadata detail
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  name: { type: string }
                  domain: { type: string }
                  path: { type: string }
                  createdAt: { type: string, format: date-time }
                  updatedAt: { type: string, format: date-time }
                  lastAccessedAt: { type: string, format: date-time }
                  status: { type: string }
                  secretType: { type: string }
                  vaultMount: { type: string }
                  accessPolicies:
                    type: array
                    items: { type: string }
        '403': { description: Unauthorized }
        '404': { description: Not found }
