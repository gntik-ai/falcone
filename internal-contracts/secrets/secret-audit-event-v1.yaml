$schema: https://json-schema.org/draft/2020-12/schema
title: SecretAuditEvent
type: object
additionalProperties: false
required:
  - eventId
  - timestamp
  - operation
  - domain
  - secretPath
  - secretName
  - requestorIdentity
  - result
properties:
  eventId: { type: string }
  timestamp: { type: string, format: date-time }
  operation:
    type: string
    enum: [read, write, delete, denied]
  domain:
    type: string
    enum: [platform, tenant, functions, gateway, iam]
  secretPath: { type: string }
  secretName: { type: string }
  requestorIdentity:
    type: object
    additionalProperties: false
    required: [type, name, namespace, serviceAccount]
    properties:
      type: { type: string, enum: [service, user] }
      name: { type: string }
      namespace: { type: string }
      serviceAccount: { type: string }
  result:
    type: string
    enum: [success, denied, error]
  denialReason:
    type: [string, 'null']
  vaultRequestId: { type: string }
not:
  anyOf:
    - required: [value]
    - required: [data]
