openapi: 3.0.3
info:
  title: Secret Inventory API
  version: 1.0.0
paths:
  /v1/secrets/inventory:
    get:
      parameters:
        - in: query
          name: domain
          required: true
          schema:
            type: string
            enum: [platform, tenant, functions, gateway, iam]
        - in: query
          name: tenantId
          schema:
            type: string
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
      responses:
        '200':
          description: Secret inventory metadata response
          content:
            application/json:
              schema:
                type: object
                required: [secrets]
                properties:
                  secrets:
                    type: array
                    items:
                      $ref: '#/components/schemas/SecretMetadataItem'
components:
  schemas:
    SecretMetadataItem:
      type: object
      additionalProperties: false
      properties:
        name: { type: string }
        domain: { type: string }
        path: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        status: { type: string }
        secretType: { type: string }
      not:
        anyOf:
          - required: [value]
          - required: [data]
